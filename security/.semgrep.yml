# Inkstone Semgrep Rules — Layer 3 Static Security
# Usage: semgrep --config .semgrep.yml --error --quiet [files...]
rules:

  # ── SQL Injection ────────────────────────────────────────────

  - id: inkstone-sqli-fstring
    patterns:
      - pattern: |
          $CONN.execute(f"...{$VAR}...")
      - pattern-not: |
          $CONN.execute(f"...{$CONST}...")
    message: >
      SQL injection via f-string interpolation. Use parameterised queries:
      conn.execute(text("... WHERE x = :val"), {"val": $VAR})
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-89"
      owasp: "A03:2021"
      layer: 3

  - id: inkstone-sqli-format
    pattern: |
      $CONN.execute("...".format(...))
    message: >
      SQL injection via str.format(). Use parameterised queries with
      sqlalchemy text() and bound parameters.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-89"
      owasp: "A03:2021"
      layer: 3

  - id: inkstone-sqli-percent
    pattern: |
      $CONN.execute("..." % ...)
    message: >
      SQL injection via %-formatting. Use parameterised queries.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-89"
      owasp: "A03:2021"
      layer: 3

  - id: inkstone-sqli-concat
    pattern: |
      $CONN.execute($A + $B)
    message: >
      SQL injection via string concatenation. Use parameterised queries.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-89"
      owasp: "A03:2021"
      layer: 3

  # ── Dangerous Functions ──────────────────────────────────────

  - id: inkstone-eval
    pattern: eval(...)
    message: >
      eval() executes arbitrary code. Use ast.literal_eval() for safe
      parsing or a dedicated parser.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-95"
      owasp: "A03:2021"
      layer: 3

  - id: inkstone-exec
    pattern: exec(...)
    message: >
      exec() executes arbitrary code. Avoid entirely or restrict to
      compile() with controlled source.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-95"
      owasp: "A03:2021"
      layer: 3

  - id: inkstone-subprocess-shell
    pattern: subprocess.$FUNC(..., shell=True, ...)
    message: >
      subprocess with shell=True enables command injection. Pass
      arguments as a list instead.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-78"
      owasp: "A03:2021"
      layer: 3

  - id: inkstone-pickle-loads
    pattern: pickle.loads(...)
    message: >
      pickle.loads() can execute arbitrary code during deserialization.
      Use JSON or a safe serialization format.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-502"
      owasp: "A08:2021"
      layer: 3

  - id: inkstone-pickle-load
    pattern: pickle.load(...)
    message: >
      pickle.load() can execute arbitrary code. Use JSON or safe alternatives.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-502"
      owasp: "A08:2021"
      layer: 3

  # ── Secret / Credential Exposure ─────────────────────────────

  - id: inkstone-hardcoded-secret-key
    pattern: |
      SECRET_KEY = "..."
    message: >
      Flask SECRET_KEY must not be hardcoded. Load from environment variable.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-798"
      owasp: "A07:2021"
      layer: 3

  - id: inkstone-hardcoded-password
    patterns:
      - pattern: |
          $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: "(?i)(password|passwd|secret|api_key|apikey|token|private_key)"
    message: >
      Potential hardcoded credential in variable "$VAR". Use environment
      variables or a secrets manager.
    languages: [python]
    severity: WARNING
    metadata:
      cwe: "CWE-798"
      owasp: "A07:2021"
      layer: 3

  # ── XSS in Jinja Templates ──────────────────────────────────

  - id: inkstone-jinja-unescaped
    pattern-regex: '\{\{.*\|\s*safe\s*\}\}'
    message: >
      Jinja2 `|safe` filter disables XSS protection. Only use on
      pre-sanitized content. Prefer `|e` or autoescaping.
    languages: [generic]
    severity: WARNING
    paths:
      include:
        - "*.html"
    metadata:
      cwe: "CWE-79"
      owasp: "A03:2021"
      layer: 3

  # ── Insecure Deserialization ─────────────────────────────────

  - id: inkstone-yaml-unsafe-load
    pattern: yaml.load($X)
    message: >
      yaml.load() without Loader is unsafe. Use yaml.safe_load() instead.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-502"
      owasp: "A08:2021"
      layer: 3

  # ── Flask Security ──────────────────────────────────────────

  - id: inkstone-flask-debug-true
    pattern: app.run(..., debug=True, ...)
    message: >
      Flask debug mode must not be enabled in production. The debugger
      allows arbitrary code execution.
    languages: [python]
    severity: ERROR
    metadata:
      cwe: "CWE-489"
      owasp: "A05:2021"
      layer: 3

  # ── JavaScript Security ─────────────────────────────────────

  - id: inkstone-js-innerhtml
    pattern: $EL.innerHTML = $VAL
    message: >
      Direct innerHTML assignment can cause XSS. Use textContent or
      sanitize with DOMPurify first.
    languages: [javascript]
    severity: WARNING
    metadata:
      cwe: "CWE-79"
      owasp: "A03:2021"
      layer: 3

  - id: inkstone-js-eval
    pattern: eval(...)
    message: >
      eval() in JavaScript executes arbitrary code. Use JSON.parse()
      or a safe alternative.
    languages: [javascript]
    severity: ERROR
    metadata:
      cwe: "CWE-95"
      owasp: "A03:2021"
      layer: 3

  - id: inkstone-js-document-write
    pattern: document.write(...)
    message: >
      document.write() can introduce XSS vulnerabilities. Use DOM
      manipulation methods instead.
    languages: [javascript]
    severity: WARNING
    metadata:
      cwe: "CWE-79"
      owasp: "A03:2021"
      layer: 3
