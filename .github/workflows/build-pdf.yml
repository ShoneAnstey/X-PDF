name: Build binaries

# Builds the portable Windows .exe, a Windows installer, and the Linux AppImage.
# Trigger manually from the Actions tab, or on a version tag (v*).
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Force any remaining Node 20 JavaScript actions (e.g. upload-artifact@v5) onto
# Node 24 ahead of GitHub's June 2026 cutoff. Safe to remove once Node 24 is the
# runner default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
      - name: Stamp build metadata
        id: stamp
        run: python packaging/stamp_build.py
      - name: Build .exe
        run: python -m PyInstaller --noconfirm packaging/inkstone.spec
      - name: Build installer (Inno Setup)
        run: iscc /DMyAppVersion=${{ steps.stamp.outputs.version }} packaging\inkstone_installer.iss
      - name: Upload portable .exe
        uses: actions/upload-artifact@v5
        with:
          name: Inkstone-windows-portable
          path: "dist/Inkstone.exe"
      - name: Upload installer
        uses: actions/upload-artifact@v5
        with:
          name: Inkstone-windows-installer
          path: "dist/Inkstone-Setup.exe"

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system + Python deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libegl1 libxcb-cursor0
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt
      - name: Stamp build metadata
        run: .venv/bin/python packaging/stamp_build.py
      - name: Build AppImage
        run: bash packaging/build_appimage.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: Inkstone-linux
          path: dist/Inkstone-x86_64.AppImage

  release:
    # Publish a GitHub Release with the binaries when a version tag is pushed.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Inkstone ${{ github.ref_name }}" \
            --generate-notes \
            "artifacts/Inkstone-windows-installer/Inkstone-Setup.exe" \
            "artifacts/Inkstone-windows-portable/Inkstone.exe" \
            "artifacts/Inkstone-linux/Inkstone-x86_64.AppImage"
