name: Build binaries

# Builds the portable Windows .exe, a Windows installer, and the Linux AppImage.
# Trigger manually from the Actions tab, or on a version tag (v*).
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

# Force any remaining Node 20 JavaScript actions (e.g. upload-artifact@v5) onto
# Node 24 ahead of GitHub's June 2026 cutoff. Safe to remove once Node 24 is the
# runner default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller
      - name: Stamp build metadata
        id: stamp
        run: python packaging/stamp_build.py
      - name: Build .exe
        run: python -m PyInstaller --noconfirm packaging/xpc_pdf.spec
      - name: Build installer (Inno Setup)
        run: iscc /DMyAppVersion=${{ steps.stamp.outputs.version }} packaging\xpdf_installer.iss
      - name: Upload portable .exe
        uses: actions/upload-artifact@v5
        with:
          name: XPDF-windows-portable
          path: "dist/XPDF.exe"
      - name: Upload installer
        uses: actions/upload-artifact@v5
        with:
          name: XPDF-windows-installer
          path: "dist/XPDF-Setup.exe"

  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install system + Python deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libegl1 libxcb-cursor0
          python -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install -r requirements.txt
      - name: Stamp build metadata
        run: .venv/bin/python packaging/stamp_build.py
      - name: Build AppImage
        run: bash packaging/build_appimage.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: XPDF-linux
          path: dist/XPDF-x86_64.AppImage
